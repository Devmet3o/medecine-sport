<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIU Médecine du Sport — Fiches Pathologies</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card2: #1c2330;
    --border: #30363d;
    --border-accent: #388bfd40;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent: #388bfd;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --accent5: #ffa657;
    --red: #f85149;
    --yellow: #e3b341;
    --tag-bg: #388bfd18;
    --shadow: 0 8px 32px #00000060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ─── LAYOUT ─── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Crimson Pro', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .logo span { color: var(--accent); }
  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
    margin-top: 2px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .search-wrap { padding: 12px 14px 8px; }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    position: relative;
  }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 13px;
    pointer-events: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 6px 0 16px; }
  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .region-group { margin-bottom: 2px; }

  .region-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 0;
    user-select: none;
  }
  .region-header:hover { background: #ffffff08; }
  .region-icon { font-size: 14px; width: 18px; text-align: center; }
  .region-name {
    flex: 1;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.2px;
  }
  .region-count {
    font-size: 10px;
    background: var(--bg);
    color: var(--text-dim);
    padding: 1px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .region-group.open .chevron { transform: rotate(90deg); }

  .patho-list { display: none; padding: 2px 0; }
  .region-group.open .patho-list { display: block; }

  .patho-item {
    padding: 6px 14px 6px 40px;
    cursor: pointer;
    font-size: 12.5px;
    color: var(--text-muted);
    transition: all 0.15s;
    border-left: 2px solid transparent;
    margin: 0 0 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .patho-item:hover { background: #ffffff06; color: var(--text); }
  .patho-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--tag-bg);
    font-weight: 500;
  }
  .patho-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .patho-item.active .patho-dot { background: var(--accent); }

  .sidebar-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-btn {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .add-btn:hover { opacity: 0.85; }

  /* ─── MAIN ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-title { font-family: 'Crimson Pro', serif; font-size: 22px; color: var(--text-muted); }
  .empty-sub { font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* ─── FICHE ─── */
  .fiche-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    display: none;
  }
  .fiche-wrap.visible { display: block; }
  .fiche-wrap::-webkit-scrollbar { width: 5px; }
  .fiche-wrap::-webkit-scrollbar-track { background: transparent; }
  .fiche-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .fiche-topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .fiche-title-block {}
  .fiche-breadcrumb {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .fiche-title {
    font-family: 'Crimson Pro', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .fiche-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
    font-style: italic;
    font-family: 'Crimson Pro', serif;
  }

  .fiche-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .btn {
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn:hover { background: var(--bg-card2); color: var(--text); }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { background: #f8514915; border-color: var(--red); }

  /* ─── SECTIONS ─── */
  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .section-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section-card:hover { border-color: #388bfd30; }
  .section-card.full { grid-column: 1 / -1; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card2);
  }
  .section-icon { font-size: 14px; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .s-epidemio .section-label { color: var(--accent2); }
  .s-clinique .section-label { color: var(--accent); }
  .s-imagerie .section-label { color: var(--accent4); }
  .s-pec .section-label { color: var(--accent5); }
  .s-notes .section-label { color: var(--text-muted); }

  .section-content {
    padding: 14px 16px;
    min-height: 80px;
    position: relative;
  }

  /* ─── EDITOR ─── */
  .section-editor {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    line-height: 1.7;
    resize: none;
    outline: none;
    min-height: 100px;
  }
  .section-editor::placeholder { color: var(--text-dim); font-style: italic; }

  /* READ MODE */
  .section-text {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .section-empty {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ─── TAGS ─── */
  .fiche-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    font-weight: 500;
  }
  .tag-sport { color: var(--accent2); border-color: var(--accent2); background: #3fb95012; }
  .tag-freq { color: var(--accent); border-color: var(--accent); background: var(--tag-bg); }
  .tag-chrono { color: var(--accent5); border-color: var(--accent5); background: #ffa65712; }

  /* ─── STATUS BAR ─── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 36px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); }
  .status-sep { color: var(--border); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #00000080;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 440px;
    max-width: 90vw;
    box-shadow: var(--shadow);
    transform: translateY(8px);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--text);
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-dim);
    margin-bottom: 5px;
    display: block;
    font-weight: 600;
  }
  .form-input, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--bg-card); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    box-shadow: var(--shadow);
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-icon { font-size: 15px; }

  /* ─── PRINT ─── */
  @media print {
    .sidebar, .fiche-actions, .status-bar { display: none !important; }
    .main { overflow: visible; }
    .fiche-wrap { overflow: visible; padding: 20px; }
    .section-editor { display: none; }
    .section-card { break-inside: avoid; }
    body { background: white; color: black; }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 700px) {
    .sections-grid { grid-template-columns: 1fr; }
    .sidebar { width: 240px; min-width: 240px; }
    .fiche-wrap { padding: 18px; }
  }

  .region-actions {
    display: none;
    gap: 2px;
    align-items: center;
  }
  .region-group:hover .region-actions { display: flex; }
  .region-action-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
    transition: all 0.15s;
    line-height: 1;
  }
  .region-action-btn:hover { background: #ffffff12; color: var(--text); }
  .region-action-btn.del:hover { color: var(--red); }

  /* Highlight search */
  mark { background: #ffa65730; color: var(--accent5); border-radius: 3px; padding: 0 2px; }
</style>
</head>
<body>

<div class="app">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Médecine <span>du Sport</span></div>
      <div class="logo-sub">Fiches pathologies · DIU</div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Rechercher une pathologie…" oninput="handleSearch(this.value)">
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Generated by JS -->
    </nav>

    <div class="sidebar-footer">
      <button class="add-btn" onclick="openModal()">
        <span>＋</span> Nouvelle pathologie
      </button>
      <button class="btn" onclick="openRegionsModal()" title="Gérer les régions" style="padding:8px 10px;flex-shrink:0;">⚙️</button>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🦴</div>
      <div class="empty-title">Sélectionne une pathologie</div>
      <div class="empty-sub">Clique sur une pathologie dans le menu pour afficher ou éditer sa fiche. Tu peux ajouter de nouvelles fiches avec le bouton ci-dessous.</div>
      <button class="btn primary" onclick="openModal()" style="margin-top:8px">＋ Créer une fiche</button>
    </div>

    <!-- Fiche viewer/editor -->
    <div class="fiche-wrap" id="ficheWrap">

      <div class="fiche-topbar">
        <div class="fiche-title-block">
          <div class="fiche-breadcrumb" id="ficheBreadcrumb"></div>
          <div class="fiche-title" id="ficheTitle"></div>
          <div class="fiche-subtitle" id="ficheSubtitle"></div>
        </div>
        <div class="fiche-actions">
          <button class="btn" onclick="toggleEdit()" id="editBtn">✏️ Éditer</button>
          <button class="btn" onclick="window.print()" title="Imprimer">🖨️</button>
          <button class="btn danger" onclick="deleteCurrentFiche()">🗑️</button>
        </div>
      </div>

      <div class="fiche-tags" id="ficheTags"></div>

      <div class="sections-grid" id="sectionsGrid">
        <!-- Generated -->
      </div>

    </div>

    <div class="status-bar" id="statusBar" style="display:none">
      <div class="status-dot"></div>
      <span id="statusText">Fiche chargée</span>
      <span class="status-sep">·</span>
      <span id="statusTime"></span>
    </div>

  </main>
</div>

<!-- ─── MODAL: Nouvelle pathologie ─── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">Nouvelle pathologie</div>

    <div class="form-group">
      <label class="form-label">Région anatomique</label>
      <select class="form-select" id="newRegion"></select>
    </div>

    <div class="form-group">
      <label class="form-label">Nom de la pathologie</label>
      <input class="form-input" id="newPathoName" placeholder="ex: Tendinite rotulienne">
    </div>

    <div class="form-group">
      <label class="form-label">Sous-titre / Latin (optionnel)</label>
      <input class="form-input" id="newPathoSub" placeholder="ex: Jumper's knee, enthésopathie quadricipitale distale">
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn primary" onclick="createFiche()">Créer la fiche</button>
    </div>
  </div>
</div>

<!-- ─── MODAL: Gérer les régions ─── -->
<div class="modal-overlay" id="regionsModalOverlay" onclick="closeRegionsModalBg(event)">
  <div class="modal">
    <div class="modal-title">Gérer les régions anatomiques</div>

    <div id="regionsList" style="margin-bottom:16px;display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;"></div>

    <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;">
      <div class="form-label" style="margin-bottom:8px">Ajouter une région</div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 60px">
          <input class="form-input" id="newRegionIcon" placeholder="🦴" maxlength="2" style="text-align:center;font-size:18px;padding:6px;">
        </div>
        <div class="form-group" style="flex:1">
          <input class="form-input" id="newRegionName" placeholder="ex: Genou, Rachis cervical…">
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeRegionsModal()">Fermer</button>
      <button class="btn primary" onclick="addRegion()">＋ Ajouter</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon">✅</span>
  <span id="toastMsg"></span>
</div>

<script>
// ─── DATA STORE ───
const SECTIONS = [
  { key: 'epidemio', label: 'Épidémiologie', icon: '📊', cls: 's-epidemio', placeholder: 'Incidence, prévalence, population cible, facteurs de risque, sexe, âge, sport concerné…' },
  { key: 'clinique', label: 'Clinique', icon: '🩺', cls: 's-clinique', placeholder: 'Anamnèse, douleur (EVA, horaire, facteur déclenchant), examen physique, tests spécifiques, signes associés…' },
  { key: 'imagerie', label: 'Imagerie', icon: '🔬', cls: 's-imagerie', placeholder: 'Radiographie standard, échographie, IRM, TDM — indications, signes, protocoles…' },
  { key: 'pec', label: 'Prise en charge', icon: '💊', cls: 's-pec', placeholder: 'Traitement conservateur, kinésithérapie, protocoles, chirurgie, reprise sportive, prévention…', full: true },
  { key: 'notes', label: 'Notes personnelles', icon: '📝', cls: 's-notes', placeholder: 'Astuces mnémotechniques, cas cliniques, points clés DIU…', full: true },
];

const DEFAULT_REGIONS = [
  { name: 'Cheville & Pied', icon: '🦶' },
  { name: 'Genou', icon: '🦵' },
  { name: 'Hanche & Bassin', icon: '⚙️' },
  { name: 'Rachis', icon: '🦴' },
  { name: 'Épaule', icon: '💪' },
  { name: 'Coude', icon: '🦾' },
  { name: 'Poignet & Main', icon: '✋' },
  { name: 'Médecine générale du sport', icon: '🏃' },
];

const SAMPLE_DATA = [
  {
    id: 'tendinite-achille',
    region: 'Cheville & Pied',
    name: 'Tendinopathie d\'Achille',
    subtitle: 'Achillodynie, tendinose achilléenne',
    sport: 'Course à pied, Triathlon',
    freq: 'Fréquent',
    epidemio: 'Très fréquente en sport de course (10-15% des coureurs). Prévalence élevée chez les coureurs de fond. Hommes > Femmes (ratio 3:1). Pic d\'incidence entre 30-50 ans. Facteurs extrinsèques : augmentation soudaine des charges, surface dure, chaussure inadaptée. Facteurs intrinsèques : hyperpronation, raideur du triceps, jambe discordante.',

  },
  {

    pec: '• Traitement conservateur (90% de guérison) :\n  - Repos relatif, modification des gestes\n  - Physiothérapie : ultrasons, ionophorèse\n  - Rééducation excentrique de Stanish\n  - Orthèse d\'épicondylienne (sangle)\n• Injections : corticoïdes (efficacité court terme, récidive fréquente), PRP (efficacité moyen terme), sang autologue\n• Ondes de choc radiales\n• Reprise: progressive avec correction technique (prise, raquette adaptée)\n• Chirurgie : Nirschl, désinsertion-réinsertion ECRB (< 5% des cas)',
    notes: 'Attention : les infiltrations de corticoïdes sont efficaces à CT mais favorisent la récidive et les rechutes à LT. Informer le patient ++\nBiomécanique tennis : revers à 1 bras >> facteur de risque',

  {
    id: 'entorse-cheville',
    region: 'Cheville & Pied',

    subtitle: 'Lésion ligamentaire de cheville, inversion',

    epidemio: '1ère pathologie traumatique du sport. ~6000 entorses/jour en France. Ligament LLE (faisceau antérieur LTFA) atteint dans 90% des cas. Récidive dans 40% des cas → chronicité. Risque élevé dans les sports avec sauts et pivots.',
    clinique: '• Mécanisme : inversion en équinisme (flexion plantaire + varus)\n• Douleur immédiate face latérale, ecchymose, œdème\n• Classification : Grade I (distension), Grade II (rupture partielle), Grade III (rupture complète)\n• Ottawa Ankle Rules : critères pour indication radio (douleur malléolaire + impossibilité appui ou douleur osseuse)\n• Tiroir antérieur : laxité > 5mm = rupture LTFA\n• Varus forcé : laxité = atteinte LCF associée',
    imagerie: '• Radio standard (face + profil ± mortaise) si Ottawa Rules +\n• Échographie : utile pour évaluer les ligaments en aigu\n• IRM : bilan ligamentaire complet, recherche lésions associées (ostéochondrale, péroniers)',

    notes: 'Ottawa Ankle Rules à mémoriser !\nÉviter AINS dans les 48-72h (phase inflammatoire utile)\nRechercher toujours une fracture du 5e métatarse (base) = piège clinique',
  },
];

// ─── STATE ───
let db = JSON.parse(localStorage.getItem('diu_sport_db') || 'null') || {
  regions: [...DEFAULT_REGIONS],
  fiches: SAMPLE_DATA,
};
let currentId = null;
let isEditing = false;

function save() {
  localStorage.setItem('diu_sport_db', JSON.stringify(db));
}

// ─── RENDER SIDEBAR ───
function renderSidebar(filter = '') {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  const groups = {};
  db.fiches.forEach(f => {
    if (!groups[f.region]) groups[f.region] = [];
    if (!filter || f.name.toLowerCase().includes(filter.toLowerCase()) || f.region.toLowerCase().includes(filter.toLowerCase())) {
      groups[f.region].push(f);
    }
  });

  const regionOrder = db.regions.map(r => r.name);
  const allRegions = [...new Set([...regionOrder, ...Object.keys(groups)])];

  allRegions.forEach(regionName => {
    const fiches = groups[regionName] || [];
    if (filter && fiches.length === 0) return;

    const regionData = db.regions.find(r => r.name === regionName) || { name: regionName, icon: '📁' };
    const isOpen = !!filter || fiches.some(f => f.id === currentId) || (fiches.length > 0 && !filter);

    const group = document.createElement('div');
    group.className = 'region-group' + (isOpen ? ' open' : '');

    group.innerHTML = `
      <div class="region-header" onclick="toggleRegion(this.parentElement)">
        <span class="region-icon">${regionData.icon}</span>
        <span class="region-name">${regionData.name}</span>
        <span class="region-count">${fiches.length}</span>
        <span class="chevron">›</span>
      </div>
      <div class="patho-list">
        ${fiches.map(f => `
          <div class="patho-item ${f.id === currentId ? 'active' : ''}" onclick="loadFiche('${f.id}')">
            <span class="patho-dot"></span>
            ${filter ? highlight(f.name, filter) : f.name}
          </div>
        `).join('')}
        ${fiches.length === 0 ? '<div class="patho-item" style="color:var(--text-dim);font-style:italic">Aucune fiche</div>' : ''}
      </div>
    `;

    nav.appendChild(group);
  });

  // Populate modal select
  const sel = document.getElementById('newRegion');
  sel.innerHTML = db.regions.map(r => `<option value="${r.name}">${r.icon} ${r.name}</option>`).join('');
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function toggleRegion(el) {
  el.classList.toggle('open');
}

// ─── LOAD FICHE ───
function loadFiche(id) {
  const f = db.fiches.find(x => x.id === id);
  if (!f) return;
  currentId = id;
  isEditing = false;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('ficheWrap').classList.add('visible');
  document.getElementById('statusBar').style.display = 'flex';

  // Breadcrumb
  const regionData = db.regions.find(r => r.name === f.region) || { icon: '📁' };
  document.getElementById('ficheBreadcrumb').innerHTML = `${regionData.icon || '📁'} ${f.region} › Pathologie`;
  document.getElementById('ficheTitle').textContent = f.name;
  document.getElementById('ficheSubtitle').textContent = f.subtitle || '';

  // Tags — only subtitle now shown as fiche-subtitle, no sport/freq tags
  const tags = document.getElementById('ficheTags');
  tags.innerHTML = '';

  // Sections
  renderSections(f);

  document.getElementById('editBtn').textContent = '✏️ Éditer';
  document.getElementById('statusText').textContent = `${f.name}`;
  document.getElementById('statusTime').textContent = `Région : ${f.region}`;

  renderSidebar(document.getElementById('searchInput').value);
}

function renderSections(f) {
  const grid = document.getElementById('sectionsGrid');
  grid.innerHTML = '';

  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = `section-card ${sec.cls}${sec.full ? ' full' : ''}`;
    card.dataset.key = sec.key;

    const content = f[sec.key] || '';

    card.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-label">${sec.label}</span>
      </div>
      <div class="section-content">
        ${isEditing
          ? `<textarea class="section-editor" data-key="${sec.key}" placeholder="${sec.placeholder}" rows="6">${content}</textarea>`
          : content
            ? `<div class="section-text">${escapeHtml(content)}</div>`
            : `<div class="section-empty">${sec.placeholder.split('…')[0]}… <br><small style="font-size:11px;color:var(--text-dim)">(cliquer sur Éditer pour renseigner)</small></div>`
        }
      </div>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── EDIT ───
function toggleEdit() {
  if (!currentId) return;
  if (isEditing) {
    saveEdits();
  } else {
    isEditing = true;
    document.getElementById('editBtn').textContent = '💾 Sauvegarder';
    const f = db.fiches.find(x => x.id === currentId);
    renderSections(f);
    document.querySelector('.section-editor')?.focus();
  }
}

function saveEdits() {
  const f = db.fiches.find(x => x.id === currentId);
  document.querySelectorAll('.section-editor').forEach(ta => {
    f[ta.dataset.key] = ta.value;
  });
  isEditing = false;
  save();
  document.getElementById('editBtn').textContent = '✏️ Éditer';
  renderSections(f);
  toast('✅', 'Fiche sauvegardée !');
}

// ─── DELETE ───
function deleteCurrentFiche() {
  if (!currentId) return;
  const f = db.fiches.find(x => x.id === currentId);
  if (!confirm(`Supprimer la fiche "${f.name}" ?`)) return;
  db.fiches = db.fiches.filter(x => x.id !== currentId);
  save();
  currentId = null;
  document.getElementById('ficheWrap').classList.remove('visible');
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('statusBar').style.display = 'none';
  renderSidebar();
  toast('🗑️', 'Fiche supprimée');
}

// ─── MODAL ───
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('newPathoName').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('newPathoName').value = '';
  document.getElementById('newPathoSub').value = '';
}
function closeModalBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function createFiche() {
  const nameVal = document.getElementById('newPathoName').value.trim();
  if (!nameVal) { alert('Donne un nom à la pathologie !'); return; }

  const regionName = document.getElementById('newRegion').value;

  const id = regionName.toLowerCase().replace(/\s+/g,'-') + '-' + nameVal.toLowerCase().replace(/\s+/g,'-').replace(/[''éèêàùôîç]/g, c => ({é:'e',è:'e',ê:'e',à:'a',ù:'u',ô:'o',î:'i',ç:'c'}[c]||c)) + '-' + Date.now();
  const fiche = {
    id,
    region: regionName,
    name: nameVal,
    subtitle: document.getElementById('newPathoSub').value.trim(),
    epidemio: '', clinique: '', imagerie: '', pec: '', notes: '',
  };
  db.fiches.push(fiche);
  save();
  closeModal();
  renderSidebar();
  loadFiche(id);
  setTimeout(() => { isEditing = false; toggleEdit(); }, 100);
  toast('✅', `Fiche "${nameVal}" créée !`);
}

// ─── REGIONS MODAL ───
function openRegionsModal() {
  renderRegionsList();
  document.getElementById('regionsModalOverlay').classList.add('open');
}
function closeRegionsModal() {
  document.getElementById('regionsModalOverlay').classList.remove('open');
}
function closeRegionsModalBg(e) {
  if (e.target === document.getElementById('regionsModalOverlay')) closeRegionsModal();
}

function renderRegionsList() {
  const list = document.getElementById('regionsList');
  list.innerHTML = db.regions.map((r) => {
    const count = db.fiches.filter(f => f.region === r.name).length;
    const esc = r.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div id="row-${esc}" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;">
      <span style="font-size:16px;width:28px;text-align:center;cursor:pointer;" onclick="cycleIcon('${esc}')" title="Changer l'icône">${r.icon}</span>
      <span style="flex:1;font-size:13px;color:var(--text);">${r.name}</span>
      <span style="font-size:11px;color:var(--text-dim);flex-shrink:0;">${count}&nbsp;fiche(s)</span>
      <button class="region-action-btn" onclick="startRename('${esc}')" style="display:inline-flex;font-size:13px;">✏️</button>
      <button class="region-action-btn" onclick="askDelete('${esc}',${count})" style="display:inline-flex;font-size:13px;color:var(--red);">🗑️</button>
    </div>`;
  }).join('');
}

function cycleIcon(name) {
  const icons = ['🦶','🦵','⚙️','🦴','💪','🦾','✋','🏃','🧠','❤️','🫁','👁️','👂','🦷','🤲','📁','🔵','⬛'];
  const r = db.regions.find(x => x.name === name);
  if (!r) return;
  r.icon = icons[(icons.indexOf(r.icon) + 1) % icons.length];
  save(); renderRegionsList(); renderSidebar();
}

function startRename(name) {
  const esc = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const row = document.getElementById('row-' + name);
  if (!row) return;
  row.innerHTML = `
    <input id="ri" style="flex:1;background:var(--bg-card2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-size:13px;padding:5px 8px;font-family:'DM Sans',sans-serif;outline:none;" value="${name}" onkeydown="if(event.key==='Enter')doRename('${esc}',this.value);if(event.key==='Escape')renderRegionsList();">
    <button class="btn primary" onclick="doRename('${esc}',document.getElementById('ri').value)" style="padding:5px 12px;font-size:12px;">OK</button>
    <button class="btn" onclick="renderRegionsList()" style="padding:5px 10px;font-size:12px;">✕</button>
  `;
  document.getElementById('ri').focus();
  document.getElementById('ri').select();
}

function doRename(oldName, newName) {
  newName = (newName || '').trim();
  if (!newName || newName === oldName) { renderRegionsList(); return; }
  const r = db.regions.find(x => x.name === oldName);
  if (r) r.name = newName;
  db.fiches.forEach(f => { if (f.region === oldName) f.region = newName; });
  if (currentId) {
    const cf = db.fiches.find(x => x.id === currentId);
    if (cf) {
      document.getElementById('ficheBreadcrumb').innerHTML = `${r?.icon||'📁'} ${cf.region} › Pathologie`;
      document.getElementById('statusTime').textContent = `Région : ${cf.region}`;
    }
  }
  save(); renderRegionsList(); renderSidebar();
  toast('✏️', `Renommé en "${newName}"`);
}

function askDelete(name, count) {
  const esc = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const row = document.getElementById('row-' + name);
  if (!row) return;
  row.style.borderColor = 'var(--red)';
  row.innerHTML = `
    <span style="flex:1;font-size:12.5px;color:var(--red);">⚠️ Supprimer <b>${name}</b>${count > 0 ? ` et ${count} fiche(s)` : ''} ?</span>
    <button class="btn primary" onclick="doDeleteRegion('${esc}')" style="padding:5px 12px;font-size:12px;background:var(--red);border-color:var(--red);">Supprimer</button>
    <button class="btn" onclick="renderRegionsList()" style="padding:5px 10px;font-size:12px;">Annuler</button>
  `;
}

function doDeleteRegion(name) {
  const deletedIds = db.fiches.filter(f => f.region === name).map(f => f.id);
  db.regions = db.regions.filter(r => r.name !== name);
  db.fiches = db.fiches.filter(f => f.region !== name);
  if (deletedIds.includes(currentId)) {
    currentId = null;
    document.getElementById('ficheWrap').classList.remove('visible');
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('statusBar').style.display = 'none';
  }
  save(); renderRegionsList(); renderSidebar();
  toast('🗑️', `"${name}" supprimée`);
}

function addRegion() {
  const name = document.getElementById('newRegionName').value.trim();
  if (!name) { toast('⚠️', 'Donne un nom à la région !'); return; }
  const icon = document.getElementById('newRegionIcon').value.trim() || '📁';
  if (db.regions.find(r => r.name === name)) { toast('⚠️', 'Cette région existe déjà.'); return; }
  db.regions.push({ name, icon });
  document.getElementById('newRegionName').value = '';
  document.getElementById('newRegionIcon').value = '';
  save(); renderRegionsList(); renderSidebar();
  toast('✅', `Région "${name}" ajoutée`);
}

// ─── SEARCH ───
function handleSearch(val) {
  renderSidebar(val);
}

// ─── TOAST ───
function toast(icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD SHORTCUTS ───
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('regionsModalOverlay').classList.contains('open')) { closeRegionsModal(); return; }
    if (document.getElementById('modalOverlay').classList.contains('open')) closeModal();
    if (isEditing) { isEditing = false; loadFiche(currentId); }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (isEditing) saveEdits();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
    e.preventDefault();
    toggleEdit();
  }
});

// ─── INIT ───
renderSidebar();
// Open first fiche by default
if (db.fiches.length > 0) {
  // don't auto-open, let user choose
}
</script>
</body>
